const Q_TYPES = [
  {
    type: "focus",
    label: "Focus",
    badgeClass: "qt-focus",
    question: (e) => `Which RRL entry focuses on: "${e.focus}"?`,
    hint: "Consider the main research focus or objective."
  },
  {
    type: "result",
    label: "Result",
    badgeClass: "qt-result",
    question: (e) => `Which study reported these key findings: "${e.results}"?`,
    hint: "Think about the outcomes and conclusions."
  },
  {
    type: "context",
    label: "Context / Method",
    badgeClass: "qt-context",
    question: (e) => `Which RRL used this context or method: "${e.context}"?`,
    hint: "Consider the setting, methodology, or system features."
  },
  {
    type: "author",
    label: "Author",
    badgeClass: "qt-author",
    question: (e) => `"${e.title}" — who are the authors of this study?`,
    hint: "Identify the authors of this work."
  },
  {
    type: "year",
    label: "Year",
    badgeClass: "qt-year",
    question: (e) => `"${e.title}" was published in what year?`,
    hint: "Identify the publication year."
  },
  {
    type: "title",
    label: "Title",
    badgeClass: "qt-title",
    question: (e) => `By ${e.authors} (${e.year}): which entry's title matches this focus — "${e.focus}"?`,
    hint: "Match the focus description to the correct study title."
  }
];

let state = {
  mode: 'quiz',
  questions: [],
  current: 0,
  answered: false,
  selected: null,
  correct: 0,
  wrong: 0,
  streak: 0,
  bestStreak: 0,
  fcIndex: 0,
  fcFlipped: false
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generateQuestions() {
  const qs = [];
  const shuffled = shuffle(ENTRIES);
  shuffled.forEach(entry => {
    const qtype = Q_TYPES[Math.floor(Math.random() * Q_TYPES.length)];
    const distractors = ENTRIES.filter(e => e.id !== entry.id);
    const shuffledD = shuffle(distractors);
    let wrongAnswers;
    if (qtype.type === 'author') {
      wrongAnswers = shuffledD.slice(0, 3).map(e => e.authors);
    } else if (qtype.type === 'year') {
      wrongAnswers = shuffledD.slice(0, 3).map(e => e.year);
    } else if (qtype.type === 'title') {
      wrongAnswers = shuffledD.slice(0, 3).map(e => e.title);
    } else {
      wrongAnswers = shuffledD.slice(0, 3).map(e => `${e.id}: ${e.title}`);
    }
    let correctAnswer;
    if (qtype.type === 'author') correctAnswer = entry.authors;
    else if (qtype.type === 'year') correctAnswer = entry.year;
    else if (qtype.type === 'title') correctAnswer = entry.title;
    else correctAnswer = `${entry.id}: ${entry.title}`;

    const options = shuffle([correctAnswer, ...wrongAnswers]);
    qs.push({
      entry,
      qtype,
      question: qtype.question(entry),
      correctAnswer,
      options
    });
  });
  return qs;
}

function updateStats() {
  const total = state.questions.length;
  const done = state.current;
  document.getElementById('streakPill').textContent = `🔥 Streak: ${state.streak}`;
  document.getElementById('correctPill').textContent = `✓ Correct: ${state.correct}`;
  document.getElementById('wrongPill').textContent = `✗ Wrong: ${state.wrong}`;
  document.getElementById('totalPill').textContent = `${done} / ${total} questions`;
  const pct = total ? (done / total) * 100 : 0;
  document.getElementById('progressBar').style.width = pct + '%';
}

function renderMode(mode) {
  state.mode = mode;
  if (mode === 'quiz') renderQuiz();
  else if (mode === 'flashcard') renderFlashcard();
}

function renderModeBar() {
  return `<div class="mode-bar">
    <button class="mode-btn ${state.mode==='quiz'?'active':''}" onclick="renderMode('quiz')">📝 Quiz Mode</button>
    <button class="mode-btn ${state.mode==='flashcard'?'active':''}" onclick="renderMode('flashcard')">📚 Flashcard Mode</button>
  </div>`;
}

function renderQuiz() {
  const main = document.getElementById('mainArea');
  if (state.current >= state.questions.length) {
    renderSummary();
    return;
  }
  const q = state.questions[state.current];
  updateStats();

  let optionsHtml = q.options.map((opt, i) => {
    let cls = 'option-btn';
    let dis = '';
    if (state.answered) {
      dis = 'disabled';
      if (opt === q.correctAnswer) cls += ' correct';
      else if (opt === state.selected && opt !== q.correctAnswer) cls += ' wrong';
    }
    return `<button class="${cls}" ${dis} onclick="selectAnswer(${i})">${opt}</button>`;
  }).join('');

  let feedbackHtml = '';
  if (state.answered) {
    const isCorrect = state.selected === q.correctAnswer;
    feedbackHtml = `<div class="feedback-card ${isCorrect?'correct-fb':'wrong-fb'}">
      <div class="fb-header">${isCorrect ? '✓ Correct!' : '✗ Incorrect'}</div>
      <div class="fb-details">
        ${!isCorrect ? `<p><strong>Correct answer:</strong> ${q.correctAnswer}</p>` : ''}
        <p><strong>RRL ${q.entry.id}:</strong> ${q.entry.title}</p>
        <p><strong>Authors:</strong> ${q.entry.authors} (${q.entry.year})</p>
        <p><strong>Focus:</strong> ${q.entry.focus}</p>
      </div>
    </div>`;
  }

  main.innerHTML = renderModeBar() + `
    <div class="question-card">
      <div class="q-label">Question ${state.current + 1} of ${state.questions.length}</div>
      <span class="q-type-badge ${q.qtype.badgeClass}">${q.qtype.label}</span>
      <p class="question-text">${q.question}</p>
    </div>
    <div class="options-grid">${optionsHtml}</div>
    ${feedbackHtml}
    ${state.answered ? `<div class="action-row">
      <button class="next-btn" onclick="nextQuestion()">${state.current + 1 < state.questions.length ? 'Next Question →' : 'See Results'}</button>
    </div>` : `<div class="action-row">
      <button class="skip-btn" onclick="skipQuestion()">Skip</button>
    </div>`}
  `;
}

function selectAnswer(i) {
  if (state.answered) return;
  const q = state.questions[state.current];
  state.selected = q.options[i];
  state.answered = true;
  if (state.selected === q.correctAnswer) {
    state.correct++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
  } else {
    state.wrong++;
    state.streak = 0;
  }
  renderQuiz();
}

function skipQuestion() {
  state.answered = true;
  state.selected = null;
  state.streak = 0;
  renderQuiz();
}

function nextQuestion() {
  state.current++;
  state.answered = false;
  state.selected = null;
  renderQuiz();
}

function renderSummary() {
  const main = document.getElementById('mainArea');
  const total = state.questions.length;
  const pct = Math.round((state.correct / total) * 100);
  let grade = pct >= 90 ? '🏆 Excellent!' : pct >= 75 ? '🌟 Great job!' : pct >= 50 ? '👍 Good effort!' : '💪 Keep studying!';

  main.innerHTML = renderModeBar() + `
    <div class="summary-card">
      <div class="summary-score">${pct}%</div>
      <div class="summary-label">${grade}</div>
      <div class="summary-grid">
        <div class="summary-stat"><div class="summary-stat-n" style="color:var(--green-mid)">${state.correct}</div><div class="summary-stat-l">Correct</div></div>
        <div class="summary-stat"><div class="summary-stat-n" style="color:var(--red-mid)">${state.wrong}</div><div class="summary-stat-l">Wrong</div></div>
        <div class="summary-stat"><div class="summary-stat-n" style="color:var(--amber-mid)">${state.bestStreak}</div><div class="summary-stat-l">Best Streak</div></div>
      </div>
      <p style="font-size:14px;color:var(--text-muted);margin-bottom:1rem;">You answered ${state.correct} out of ${total} questions correctly.</p>
      <button class="restart-btn" onclick="restartQuiz()">🔄 Try Again (New Questions)</button>
    </div>
  `;
  document.getElementById('progressBar').style.width = '100%';
}

function restartQuiz() {
  state.questions = generateQuestions();
  state.current = 0;
  state.answered = false;
  state.selected = null;
  state.correct = 0;
  state.wrong = 0;
  state.streak = 0;
  state.bestStreak = 0;
  renderQuiz();
}

function renderFlashcard() {
  const main = document.getElementById('mainArea');
  const entry = ENTRIES[state.fcIndex];
  const total = ENTRIES.length;

  main.innerHTML = renderModeBar() + `
    <div class="flashcard-wrap" onclick="flipCard()">
      <div class="flashcard-inner ${state.fcFlipped ? 'flipped' : ''}" id="fcInner">
        <div class="fc-face fc-front">
          <div class="fc-hint">RRL ${entry.id}</div>
          <div class="fc-content">
            <p style="font-weight:600;font-size:16px;margin-bottom:12px;">${entry.title}</p>
            <p style="font-size:13px;color:var(--text-muted);">by ${entry.authors} (${entry.year})</p>
          </div>
          <div class="fc-flip-hint">Tap to reveal details</div>
        </div>
        <div class="fc-face fc-back">
          <div style="width:100%">
            <div class="fc-answer">
              <div class="fc-answer-label">Focus</div>
              <p style="margin-bottom:12px;">${entry.focus}</p>
              <div class="fc-answer-label">Context / Method</div>
              <p style="margin-bottom:12px;">${entry.context}</p>
              <div class="fc-answer-label">Key Results</div>
              <p>${entry.results}</p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="fc-counter">${state.fcIndex + 1} / ${total}</div>
    <div class="fc-nav">
      <button onclick="fcPrev()">← Previous</button>
      <button onclick="fcNext()">Next →</button>
    </div>
    <div style="font-size:12px;color:var(--text-muted);text-align:center;margin-top:4px;">Tap the card to flip</div>
  `;
}

function flipCard() {
  state.fcFlipped = !state.fcFlipped;
  const el = document.getElementById('fcInner');
  if (el) el.classList.toggle('flipped', state.fcFlipped);
}

function fcNext() {
  state.fcIndex = (state.fcIndex + 1) % ENTRIES.length;
  state.fcFlipped = false;
  renderFlashcard();
}

function fcPrev() {
  state.fcIndex = (state.fcIndex - 1 + ENTRIES.length) % ENTRIES.length;
  state.fcFlipped = false;
  renderFlashcard();
}

state.questions = generateQuestions();
renderQuiz();
updateStats();
</script>
